<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>for zenith</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Karla:wght@400;500&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #2b2230;
    --bg-deep: #221a27;
    --pink: #f5b8c4;
    --pink-deep: #e39aab;
    --glow: #ffc97a;
    --cream: #fff6ea;
    --muted: #a08ba0;
    --wick: #4a3a45;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    background: radial-gradient(ellipse at 50% 30%, var(--bg) 0%, var(--bg-deep) 100%);
    color: var(--cream);
    font-family: 'Karla', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    padding: 32px 20px 40px;
    text-align: center;
  }

  header { margin-bottom: 8px; }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 1.9rem;
    letter-spacing: 0.02em;
    color: var(--pink);
  }

  h1 em { font-style: italic; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  h1 em:active { color: var(--glow); }

  .sub {
    margin-top: 10px;
    font-size: 0.85rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .scene {
    position: relative;
    margin: 28px 0 10px;
    width: 240px;
    height: 300px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    border: none;
    background: none;
    outline-offset: 8px;
  }

  .scene:focus-visible { outline: 2px solid var(--pink); border-radius: 16px; }

  .glow {
    position: absolute;
    left: 50%; top: 30%;
    width: 340px; height: 340px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(255,201,122,0.35) 0%, rgba(255,201,122,0.12) 40%, transparent 70%);
    opacity: 0;
    transition: opacity 1.2s ease;
    pointer-events: none;
  }

  .lit .glow {
    opacity: 1;
    animation: breathe 10s ease-in-out infinite;
  }

  @keyframes breathe {
    0%   { transform: translate(-50%, -50%) scale(0.9); }
    40%  { transform: translate(-50%, -50%) scale(1.08); }
    100% { transform: translate(-50%, -50%) scale(0.9); }
  }

  .flame {
    position: absolute;
    left: 50%; bottom: 208px;
    width: 22px; height: 42px;
    transform: translateX(-50%) scale(0);
    transform-origin: bottom center;
    background: radial-gradient(ellipse at 50% 80%, #fff3d6 0%, var(--glow) 45%, #f08a3c 80%, transparent 100%);
    border-radius: 50% 50% 50% 50% / 62% 62% 38% 38%;
    filter: blur(0.5px);
    transition: transform 0.6s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
  }

  .lit .flame {
    transform: translateX(-50%) scale(1);
    animation: flicker 2.4s ease-in-out infinite;
  }

  @keyframes flicker {
    0%, 100% { transform: translateX(-50%) scale(1) rotate(-1.5deg); }
    25%      { transform: translateX(-52%) scale(1.05, 0.96) rotate(1deg); }
    50%      { transform: translateX(-49%) scale(0.97, 1.04) rotate(-1deg); }
    75%      { transform: translateX(-51%) scale(1.02) rotate(1.5deg); }
  }

  /* invisible tap target over the flame, active only when lit */
  .flame-tap {
    position: absolute;
    left: 50%; bottom: 196px;
    width: 76px; height: 84px;
    transform: translateX(-50%);
    background: none;
    border: none;
    cursor: pointer;
    display: none;
    z-index: 2;
    -webkit-tap-highlight-color: transparent;
  }
  .lit .flame-tap { display: block; }
  .flame-tap:focus-visible { outline: 1px dashed rgba(255,201,122,0.5); border-radius: 50%; }


  .wick {
    position: absolute;
    left: 50%; bottom: 200px;
    width: 3px; height: 12px;
    transform: translateX(-50%);
    background: var(--wick);
    border-radius: 2px;
  }

  .candle {
    position: absolute;
    left: 50%; bottom: 110px;
    width: 58px; height: 92px;
    transform: translateX(-50%);
    background: linear-gradient(180deg, #fdf3e3 0%, #f3e2cc 100%);
    border-radius: 8px 8px 4px 4px;
  }

  .candle::before {
    content: "";
    position: absolute;
    top: -4px; left: 0; right: 0;
    height: 10px;
    background: #fff8ec;
    border-radius: 50%;
  }

  .holder {
    position: absolute;
    left: 50%; bottom: 24px;
    width: 150px; height: 96px;
    transform: translateX(-50%);
    background:
      radial-gradient(circle at 11px 0px, rgba(197,109,131,0.30) 0 5px, transparent 6px) 0 0 / 22px 14px repeat,
      radial-gradient(circle at 11px 0px, rgba(197,109,131,0.30) 0 5px, transparent 6px) 11px 7px / 22px 14px repeat,
      linear-gradient(160deg, var(--pink) 0%, var(--pink-deep) 78%, #d4879b 100%);
    border-radius: 14px 14px 60px 60px / 14px 14px 78px 78px;
    box-shadow: inset 0 -12px 24px rgba(0,0,0,0.18), inset 8px 6px 14px rgba(255,255,255,0.28);
  }

  .holder::after {
    content: "";
    position: absolute;
    top: 16px; left: 22px;
    width: 44px; height: 30px;
    background: linear-gradient(140deg, #ffd3dc 0%, #fcc4d1 100%);
    border-radius: 60% 45% 55% 50% / 55% 60% 45% 55%;
    opacity: 0.9;
  }

  .holder-rim {
    position: absolute;
    left: 50%; bottom: 112px;
    width: 162px; height: 18px;
    transform: translateX(-50%);
    background: linear-gradient(180deg, #fac9d3 0%, var(--pink-deep) 100%);
    border-radius: 50%;
  }

  /* ---------- critters ---------- */
  .critter { position: absolute; pointer-events: none; }

  .tarantula {
    top: 0; right: 10px;
    display: flex; flex-direction: column; align-items: center;
    animation: hangbob 4s ease-in-out infinite;
  }
  .tarantula .thread { width: 1.5px; height: 64px; background: rgba(255,246,234,0.22); }
  @keyframes hangbob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(10px); } }

  .dog {
    bottom: 2px;
    animation: dance 1.6s ease-in-out infinite;
    transform-origin: bottom center;
  }
  .chihuahua { left: -6px; }
  .corgi { right: -14px; animation-delay: 0.4s; }
  @keyframes dance {
    0%, 100% { transform: translateY(0) rotate(-6deg); }
    50%      { transform: translateY(-9px) rotate(6deg); }
  }

  .pond {
    position: fixed;
    left: 0; right: 0; bottom: 64px;
    height: 60px;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .swimmer {
    position: absolute;
    left: 0; top: 6px;
    animation: swim 16s ease-in-out infinite alternate;
  }
  .swimmer .flip {
    display: block;
    animation: flipdir 32s steps(1) infinite, bob 3s ease-in-out infinite;
  }
  @keyframes swim { from { transform: translateX(2vw); } to { transform: translateX(calc(98vw - 92px)); } }
  @keyframes flipdir { 0%, 100% { transform: scaleX(1); } 50% { transform: scaleX(-1); } }
  @keyframes bob { 0%,100% { translate: 0 0; } 50% { translate: 0 -6px; } }

  @media (prefers-reduced-motion: reduce) {
    .tarantula, .dog, .swimmer, .swimmer .flip { animation: none; }
  }

  .snake { position: absolute; pointer-events: none; }

  /* corn snake draped along the holder rim */
  .corn {
    bottom: 118px; left: 50%;
    transform: translateX(-50%);
    animation: sway 5s ease-in-out infinite;
  }
  @keyframes sway { 0%,100% { transform: translateX(-52%);} 50% { transform: translateX(-48%);} }

  /* kingsnake coiled at the left front of the holder */
  .king { bottom: 16px; left: 28px; animation: coilbob 6s ease-in-out infinite; }

  /* ball python coiled at the right front */
  .ball { bottom: 14px; right: 30px; animation: coilbob 7s ease-in-out infinite reverse; }

  @keyframes coilbob { 0%,100% { transform: rotate(-2deg);} 50% { transform: rotate(2deg);} }

  @media (prefers-reduced-motion: reduce) { .snake { animation: none; } }

  .hint {
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    transition: opacity 0.8s ease;
    min-height: 1.2em;
  }

  .note-area {
    max-width: 480px;
    width: 100%;
    min-height: 190px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    margin-top: 18px;
  }

  .note {
    font-family: 'Caveat', cursive;
    font-weight: 500;
    font-size: 1.85rem;
    line-height: 1.35;
    color: var(--cream);
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 1s ease, transform 1s ease;
    padding: 0 8px;
  }

  .note.show { opacity: 1; transform: translateY(0); }
  .note.secret { color: var(--pink); }
  .note.case {
    font-family: 'Special Elite', monospace;
    font-size: 1rem;
    line-height: 1.7;
    color: var(--glow);
    text-align: left;
    white-space: pre-line;
  }

  .signature {
    font-family: 'Caveat', cursive;
    font-weight: 600;
    font-size: 1.3rem;
    color: var(--pink);
    margin-top: 14px;
    opacity: 0;
    transition: opacity 1s ease 0.5s;
  }

  .signature.show { opacity: 1; }

  .buttons {
    display: flex;
    gap: 12px;
    margin-top: 26px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .pill {
    background: none;
    border: 1px solid rgba(245,184,196,0.45);
    color: var(--pink);
    font-family: 'Karla', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 22px;
    border-radius: 999px;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease 0.8s, background 0.25s ease, color 0.25s ease;
  }

  .pill.show { opacity: 1; pointer-events: auto; }
  .pill:hover, .pill:focus-visible { background: var(--pink); color: var(--bg-deep); outline: none; }

  .pill.quiet {
    border-color: rgba(160,139,160,0.4);
    color: var(--muted);
  }
  .pill.quiet:hover, .pill.quiet:focus-visible { background: var(--muted); color: var(--bg-deep); }


  footer {
    margin-top: auto;
    padding-top: 32px;
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    color: rgba(160,139,160,0.65);
    line-height: 1.8;
  }

  /* ---------- breathing mode ---------- */
  .breath-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg-deep);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1s ease;
  }

  .breath-overlay.on { opacity: 1; pointer-events: auto; }

  .breath-glow {
    width: 220px; height: 220px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,201,122,0.5) 0%, rgba(245,184,196,0.25) 55%, transparent 75%);
    transform: scale(0.7);
  }

  .breath-overlay.on .breath-glow {
    animation: breathBig 10s ease-in-out infinite;
  }

  @keyframes breathBig {
    0%   { transform: scale(0.7); }
    40%  { transform: scale(1.25); }
    100% { transform: scale(0.7); }
  }

  .breath-text {
    margin-top: 48px;
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    color: var(--cream);
    min-height: 1.6em;
    letter-spacing: 0.04em;
  }

  .breath-sub {
    margin-top: 10px;
    font-size: 0.8rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .breath-exit {
    position: absolute;
    bottom: 40px;
    background: none;
    border: none;
    color: rgba(160,139,160,0.7);
    font-family: 'Karla', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 12px 20px;
  }
  .breath-exit:hover, .breath-exit:focus-visible { color: var(--cream); outline: none; }

  @media (prefers-reduced-motion: reduce) {
    .lit .glow, .lit .flame, .breath-overlay.on .breath-glow { animation: none; }
    .note, .signature, .pill, .glow, .flame, .breath-overlay { transition-duration: 0.2s; }
  }
</style>
</head>
<body>

<header>
  <h1>for <em id="nameTap">zenith</em></h1>
  <p class="sub" id="sub">in case the day feels heavy</p>
</header>

<div class="scene" id="scene" role="button" tabindex="0" aria-label="Light the candle to read a note">
  <div class="glow"></div>
  <div class="flame"></div>
  <div class="wick"></div>
  <div class="candle"></div>
  <div class="holder-rim"></div>
  <div class="holder"></div>
  <button class="flame-tap" id="flameTap" aria-label="The flame"></button>

  <div class="critter tarantula" aria-hidden="true">
    <div class="thread"></div>
    <svg width="46" height="42" viewBox="0 0 60 54">
      <g stroke="#4a3630" stroke-width="3" stroke-linecap="round" fill="none">
        <path d="M24 26 C14 20 9 13 5 8"/><path d="M23 30 C11 28 7 24 3 21"/>
        <path d="M23 34 C12 37 8 41 5 46"/><path d="M25 37 C16 44 13 49 10 53"/>
        <path d="M36 26 C46 20 51 13 55 8"/><path d="M37 30 C49 28 53 24 57 21"/>
        <path d="M37 34 C48 37 52 41 55 46"/><path d="M35 37 C44 44 47 49 50 53"/>
      </g>
      <ellipse cx="30" cy="38" rx="11" ry="10" fill="#5a3d33"/>
      <ellipse cx="30" cy="24" rx="8" ry="7" fill="#6b4a3a"/>
      <circle cx="27" cy="22" r="1.4" fill="#2b2230"/><circle cx="33" cy="22" r="1.4" fill="#2b2230"/>
    </svg>
  </div>

  <div class="critter dog chihuahua" aria-hidden="true">
    <svg width="40" height="46" viewBox="0 0 44 50">
      <path d="M8 16 L13 2 L20 13 Z" fill="#d9a066"/>
      <path d="M36 16 L31 2 L24 13 Z" fill="#d9a066"/>
      <circle cx="22" cy="19" r="11" fill="#d9a066"/>
      <circle cx="18" cy="17" r="1.7" fill="#2b2230"/><circle cx="26" cy="17" r="1.7" fill="#2b2230"/>
      <ellipse cx="22" cy="23" rx="3" ry="2.2" fill="#fff6ea"/>
      <circle cx="22" cy="22" r="1.3" fill="#2b2230"/>
      <ellipse cx="22" cy="40" rx="9" ry="9.5" fill="#d9a066"/>
      <circle cx="12" cy="36" r="3" fill="#d9a066"/><circle cx="32" cy="36" r="3" fill="#d9a066"/>
      <path d="M31 44 C37 42 39 38 38 34" stroke="#d9a066" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    </svg>
  </div>

  <div class="snake corn" aria-hidden="true">
    <svg width="150" height="26" viewBox="0 0 150 26">
      <path d="M4 16 Q20 4 38 14 T74 14 T110 14 T140 12" stroke="#e0703a" stroke-width="7" fill="none" stroke-linecap="round"/>
      <path d="M4 16 Q20 4 38 14 T74 14 T110 14 T140 12" stroke="#a8432a" stroke-width="7" fill="none" stroke-linecap="round" stroke-dasharray="7 9"/>
      <ellipse cx="142" cy="12" rx="6" ry="4.5" fill="#e0703a"/>
      <circle cx="144" cy="11" r="1.1" fill="#2b2230"/>
      <path d="M148 12 l4 -1 m-4 1 l4 1.5" stroke="#c93a3a" stroke-width="1" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="snake king" aria-hidden="true">
    <svg width="46" height="34" viewBox="0 0 46 34">
      <path d="M23 26 C10 26 8 16 18 13 C28 10 34 15 32 20 C30 25 22 24 23 19" stroke="#2e2a33" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M23 26 C10 26 8 16 18 13 C28 10 34 15 32 20 C30 25 22 24 23 19" stroke="#fff6ea" stroke-width="6" fill="none" stroke-linecap="round" stroke-dasharray="4 8"/>
      <ellipse cx="24" cy="17" rx="5" ry="4" fill="#2e2a33"/>
      <circle cx="26" cy="16" r="1" fill="#fff6ea"/>
    </svg>
  </div>

  <div class="snake ball" aria-hidden="true">
    <svg width="50" height="36" viewBox="0 0 50 36">
      <path d="M25 28 C10 28 7 16 19 13 C31 10 39 16 36 22 C33 28 23 26 25 20" stroke="#7a5c40" stroke-width="7" fill="none" stroke-linecap="round"/>
      <path d="M25 28 C10 28 7 16 19 13 C31 10 39 16 36 22 C33 28 23 26 25 20" stroke="#d9b380" stroke-width="7" fill="none" stroke-linecap="round" stroke-dasharray="6 10"/>

  </div>

  <div class="critter dog corgi" aria-hidden="true">
    <svg width="58" height="42" viewBox="0 0 62 46">
      <path d="M8 14 L12 2 L18 11 Z" fill="#e8944a"/>

      <rect x="18" y="20" width="36" height="16" rx="8" fill="#e8944a"/>

      <rect x="22" y="33" width="5" height="9" rx="2.5" fill="#e8944a"/>
      <rect x="31" y="33" width="5" height="9" rx="2.5" fill="#fff6ea"/>
      <rect x="41" y="33" width="5" height="9" rx="2.5" fill="#e8944a"/>

      <ellipse cx="30" cy="30" rx="8" ry="5" fill="#fff6ea"/>

  </div>
</div>

<p class="hint" id="hint">tap the candle you painted</p>

<div class="note-area">
  <p class="note" id="note" aria-live="polite"></p>
  <p class="signature" id="signature">&mdash; amine</p>
  <div class="buttons">
    <button class="pill" id="another">one more</button>
    <button class="pill quiet" id="breathBtn">today was a lot</button>
  </div>
</div>

<footer>
  the glow breathes with you &mdash; in for 4, out for 6<br>
  built july 2026, after the pottery date
</footer>

<div class="pond" aria-hidden="true">
  <div class="swimmer">
    <span class="flip">
      <svg width="92" height="46" viewBox="0 0 100 50">
        <path d="M14 25 C14 14 26 8 42 8 C66 8 78 14 84 20 L97 10 C95 22 95 28 97 40 L84 30 C78 36 66 42 42 42 C26 42 14 36 14 25 Z" fill="#f5b8c4"/>
        <g stroke="#e881a0" stroke-width="4" stroke-linecap="round">
          <path d="M16 14 L6 7"/><path d="M12 20 L2 17"/><path d="M11 28 L2 32"/>
        </g>
        <circle cx="24" cy="22" r="2.4" fill="#2b2230"/>
        <path d="M20 30 Q24 34 29 30" stroke="#d4879b" stroke-width="2" fill="none" stroke-linecap="round"/>
        <circle cx="17" cy="28" r="2.6" fill="#f8cdd8"/>
        <ellipse cx="40" cy="43" rx="4" ry="3" fill="#f5b8c4"/>
        <ellipse cx="62" cy="43" rx="4" ry="3" fill="#f5b8c4"/>
      </svg>
    </span>
  </div>
</div>

<div class="breath-overlay" id="breathOverlay">
  <div class="breath-glow"></div>
  <p class="breath-text" id="breathText">breathe in</p>
  <p class="breath-sub">no words needed. just this.</p>
  <button class="breath-exit" id="breathExit">back to the candle</button>
</div>

<script>
  const notes = [
    "Whatever it is — it's not too much. It never was.",
    "Reminder: you're the person who spent forever getting one tiny section of a candle holder perfect. And it was perfect. That's just how you do things — slow, careful, and worth it. This will be too.",
    "Breathe. In for 4, out for 6. The candle will do it with you. I'll wait.",
    "You don't have to have it figured out today. Today just needs surviving. Tomorrow can be impressed by you.",
    "Text me. Yes, even about this. Especially about this.",
    "Stress check: have you eaten? Drink water. This is a threat 🥰",
    "You're a designer — treat the problem like a bad first draft. It's allowed to be ugly right now.",
    "Somewhere out there, I'm rooting for you. Probably right now, actually.",
    "Nothing about you has ever felt like a burden to me. Not once.",
    "Close the laptop. Look out a window. There's a whole world out there that has no deadlines in it."
  ];

  const caseNote = "CASE FILE #002 — the mystery of the racing heart\nSUSPECT: Zenith. Cutiepie. Cheeky. Cinnamon girl.\nEVIDENCE: one perfectly painted candle holder. Several very cute decisions about colours. A laugh the detective keeps thinking about.\nVERDICT: guilty of being the best part of my week.\nSENTENCE: a second date. No appeals.\n— detective amine";

  const secretNote = "You looked very cute on our first date — especially when you were deciding which colours to use, and when you were painting.";

  const scene = document.getElementById('scene');
  const flameTap = document.getElementById('flameTap');
  const hint = document.getElementById('hint');
  const note = document.getElementById('note');
  const signature = document.getElementById('signature');
  const another = document.getElementById('another');
  const breathBtn = document.getElementById('breathBtn');
  const breathOverlay = document.getElementById('breathOverlay');
  const breathText = document.getElementById('breathText');
  const breathExit = document.getElementById('breathExit');
  const sub = document.getElementById('sub');

  // time-aware subtitle
  const h = new Date().getHours();
  if (h < 12) sub.textContent = 'in case the morning feels heavy';
  else if (h < 18) sub.textContent = 'in case the day feels heavy';
  else sub.textContent = 'in case tonight feels heavy';

  let deck = [];
  let lit = false;
  let lastIndex = -1;

  function shuffle(arr) {
    const a = [...arr.keys()];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function nextNote() {
    if (deck.length === 0) {
      deck = shuffle(notes);
      if (deck[deck.length - 1] === lastIndex && deck.length > 1) {
        [deck[deck.length - 1], deck[0]] = [deck[0], deck[deck.length - 1]];
      }
    }
    lastIndex = deck.pop();
    return notes[lastIndex];
  }

  function displayNote(text, isSecret) {
    note.classList.remove('show');
    signature.classList.remove('show');
    setTimeout(() => {
      note.textContent = text;
      note.classList.toggle('secret', isSecret === 'pink');
      note.classList.toggle('case', isSecret === 'case');
      note.classList.add('show');
      signature.classList.add('show');
      another.classList.add('show');
      breathBtn.classList.add('show');
    }, lit ? 350 : 900);
  }

  scene.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); scene.click(); }
  });

  scene.addEventListener('click', () => {
    if (!lit) {
      lit = true;
      scene.classList.add('lit');
      hint.style.opacity = '0';
    }
    displayNote(nextNote(), false);
  });

  another.addEventListener('click', () => {
    displayNote(nextNote(), false);
  });

  document.getElementById('nameTap').addEventListener('click', () => {
    if (!lit) {
      lit = true;
      scene.classList.add('lit');
      hint.style.opacity = '0';
    }
    displayNote(caseNote, 'case');
  });

  flameTap.addEventListener('click', (e) => {
    e.stopPropagation();
    displayNote(secretNote, 'pink');
  });


  // breathing mode
  let breathTimer = null;

  function startBreathCycle() {
    breathText.textContent = 'breathe in';
    let phase = 0;
    function cycle() {
      if (phase === 0) {
        breathText.textContent = 'breathe in';
        breathTimer = setTimeout(cycle, 4000);
        phase = 1;
      } else {
        breathText.textContent = 'and out, slowly';
        breathTimer = setTimeout(cycle, 6000);
        phase = 0;
      }
    }
    cycle();
  }

  breathBtn.addEventListener('click', () => {
    breathOverlay.classList.add('on');
    startBreathCycle();
  });

  breathExit.addEventListener('click', () => {
    breathOverlay.classList.remove('on');
    clearTimeout(breathTimer);
  });
</script>

</body>
</html>
